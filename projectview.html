<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض المشروع | PROJEXA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* نظام الألوان الفخم "المبهر والجاذب للعين" - Cyber Luxury Theme */
        :root { 
            --primary: #3b82f6; 
            --dark: #020617; 
            --bg-gradient: linear-gradient(135deg, #020617 0%, #0b1329 50%, #110c1f 100%);
            --card-glass: rgba(15, 23, 42, 0.75);
            --industrial-border: rgba(255, 255, 255, 0.06);
            --accent: #10b981; 
            --danger: #ef4444; 
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --text-glow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background-color: var(--dark); 
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-light); 
            padding-top: 90px; 
            overflow-x: hidden;
        }

        /* شبكة الخلفية الرقمية المتوهجة خفيف */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(168, 85, 247, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.01) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* ستايل الناف بار الثابت والشفاف الفاخر */
        .navbar { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 18px 8%; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.3); 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; 
            border-bottom: 1px solid var(--industrial-border);
        }
        
        .navbar a.logo-link { text-decoration: none; font-size: 26px; font-weight: 900; color: var(--text-light); letter-spacing: -0.5px; }
        .navbar a.logo-link span { color: var(--primary); text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        .container { max-width: 950px; margin: 40px auto; padding: 0 20px; }
        
        /* كارت عرض تفاصيل المشروع الزجاجي والمشع */
        .project-card { 
            background: var(--card-glass); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 45px; 
            border-radius: 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            border: 2px solid var(--industrial-border);
            position: relative;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        
        /* كروت التفاصيل الداخلية */
        .info-card { 
            background: rgba(30, 41, 59, 0.4); 
            padding: 28px; 
            border-radius: 20px; 
            margin-top: 25px; 
            border-right: 5px solid var(--primary); 
            border-left: 1px solid var(--industrial-border);
            border-top: 1px solid var(--industrial-border);
            border-bottom: 1px solid var(--industrial-border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .info-card:hover { transform: translateX(-3px); background: rgba(30, 41, 59, 0.55); }
        .info-card h3 { font-size: 1.25rem; margin-bottom: 12px; font-weight: 700; display: flex; align-items: center; gap: 10px; }

        /* شبكة المشكلة والحل الرقمية */
        .ps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 25px; }
        .ps-box { padding: 25px; border-radius: 20px; border-left: 1px solid var(--industrial-border); border-top: 1px solid var(--industrial-border); border-bottom: 1px solid var(--industrial-border); box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: all 0.3s ease; }
        .ps-box:hover { transform: translateY(-3px); }
        .ps-box h3 { font-size: 1.2rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        .problem { background: rgba(254, 242, 242, 0.03); border-right: 5px solid var(--danger); }
        .problem:hover { box-shadow: 0 15px 30px rgba(239, 68, 68, 0.15); }
        
        .solution { background: rgba(240, 253, 244, 0.03); border-right: 5px solid var(--accent); }
        
        /* قائمة أسماء فريق العمل بشكل منظم وجذاب */
        .team-list { list-style: none; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; row-gap: 12px; column-gap: 20px; }
        .team-list li { background: rgba(255,255,255,0.02); padding: 10px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.04); display: flex; align-items: center; }
        .team-list li::before { content: "⚡"; color: var(--primary); margin-left: 10px; font-size: 12px; }
        
        /* زر تحميل ملف الـ PDF اللامع والمشجع للضغط */
        .btn-download { 
            display: block; width: 100%; 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            color: white; text-align: center; 
            padding: 18px; border-radius: 16px; text-decoration: none; 
            margin-top: 35px; font-size: 16px; font-weight: 700; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            border: 1px solid var(--industrial-border); cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .btn-download:hover { 
            transform: translateY(-2px);
            color: white !important;
        }
        
        /* حاوية العرض المرئي لليوتيوب بنمط نيون سينمائي يشد العين */
        .video-container-card { margin-top: 25px; margin-bottom: 30px; }
        .video-container-card h3 { font-size: 1.25rem; color: var(--text-light); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; text-shadow: var(--text-glow); }
        
        .video-mockup-link { 
            display: block; position: relative; width: 100%; height: 380px; 
            border-radius: 24px; overflow: hidden; text-decoration: none; 
            box-shadow: 0 20px 45px rgba(0,0,0,0.5); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 2px solid var(--industrial-border);
        }
        .video-mockup-link.no-thumb { background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); }
        .video-mockup-link:hover { transform: scale(1.015); }
        
        /* زر البلاي المضيء جداً في المنتصف */
        .play-button-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80px; height: 80px; background: #ef4444; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: white; 
            font-size: 30px; box-shadow: 0 0 35px rgba(239, 68, 68, 0.6); 
            transition: all 0.3s ease; padding-right: 4px; 
        }
        .video-mockup-link:hover .play-button-overlay { background: #dc2626; transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 50px #ef4444; }
        
        .video-caption-overlay { position: absolute; bottom: 0; right: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, rgba(2,6,23,0.95)); color: white; }
        .video-caption-overlay p { font-size: 14px; opacity: 0.7; margin-bottom: 6px; }
        .video-caption-overlay h4 { font-size: 18px; font-weight: 700; }

        /* منطقة جلسة المستخدم المحدثة والشيك */
        .user-nav-box { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .user-name-txt { font-weight: 700; color: var(--primary); text-shadow: 0 0 10px rgba(59,130,246,0.2); }
        .logout-btn-nav { background: #ef4444; color: white; border: none; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-size: 12px; font-weight: bold; box-shadow: 0 4px 12px rgba(239,68,68,0.2); transition: 0.2s; }
        .logout-btn-nav:hover { background: #dc2626; transform: translateY(-1px); }

        @media (max-width: 768px) {
            .ps-grid, .team-list { grid-template-columns: 1fr; gap: 15px; }
            .project-card { padding: 25px; }
            .video-mockup-link { height: 250px; }
        }
    </style>

                    </div>
                    
                    <div class="ps-grid">
                        <div class="ps-box problem">
                            <h3 style="color:var(--danger)"><i class="fas fa-exclamation-triangle"></i> المشكلة الحقيقية</h3>
                            <p style="line-height:1.7; color:#fca5a5; font-size:14px;">${data.problem}</p>
                        </div>
                        <div class="ps-box solution" style="border-right-color:${themeColor}">
                            <h3 style="color:${themeColor}"><i class="fas fa-check-circle"></i> الحل البرمجي والهندسي</h3>
                            <p style="line-height:1.7; color:var(--text-light); font-size:14px;">${data.solution}</p>
                        </div>
                    </div>
                    
                    <div class="info-card" style="border-right-color:${themeColor}">
                        <h3><i class="fas fa-bullseye" style="color:${themeColor}"></i> الأهداف الاستراتيجية</h3>
                        <p style="line-height:1.8; color:var(--text-light);">${data.goal}</p>
                    </div>
                    
                    ${data.team ? `
                        <div class="info-card" style="border-right-color:${themeColor}">
                            <h3><i class="fas fa-users" style="color:${themeColor}"></i> نخبة مهندسي فريق العمل</h3>
                            <ul class="team-list">${data.team.map(n => `<li>${n.trim()}</li>`).join('')}</ul>
                        </div>
                    ` : ''}
                    
                    ${data.supervisors ? `
                        <div class="info-card" style="border-right-color:${themeColor}">
                            <h3><i class="fas fa-user-tie" style="color:${themeColor}"></i> هيئة الإشراف والتحكيم المعتمدة</h3>
                            <p style="font-weight:700; color:#e2e8f0; font-size:15px;">${data.supervisors}</p>
                        </div>
                    ` : ''}
                    
                    <button onclick="triggerPdfDownload()" class="btn-download" style="background: linear-gradient(135deg, ${themeColor}dd 0%, ${themeColor} 100%); box-shadow: ${glowShadow}; border-color:${themeColor};">
                        <i class="fas fa-file-pdf" style="margin-left:8px;"></i> تصدير التقرير الاستثماري الكامل للمشروع (PDF)
                    </button>
                </article>
            `;
        } else {
            container.innerHTML = `<div class="project-card" style="text-align:center; border-color:var(--danger);"><h1 style="color:var(--danger)">عذراً، المشروع غير موجود</h1><p style="color:var(--text-muted); margin-top:10px;">يرجى التأكد من اختيار معرّف مشروع صحيح من واجهة الكليات.</p></div>`;
        }

        function triggerPdfDownload() {
            const element = document.getElementById('printableArea');
            const projectTitle = projects[id] ? projects[id].title : 'Project';
            
            const downloadBtn = element.querySelector('.btn-download');
            const videoCard = document.getElementById('videoCard');
            
            if(downloadBtn) downloadBtn.style.display = 'none';
            if(videoCard) videoCard.style.display = 'none';
            
            // تحسين شكل كارت الطباعة لحفظ التقرير بخلفية مناسبة وجميلة في ملف الـ PDF
            element.style.background = "#0b1329";
            element.style.color = "#ffffff";

            const opt = {
                margin:       [15, 12, 15, 12],
                filename:     `تقرير_${projectTitle}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#0b1329' },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                if(downloadBtn) downloadBtn.style.display = 'block';
                if(videoCard) videoCard.style.display = 'block';
                element.style.background = "var(--card-glass)";
            }).catch(err => {
                if(downloadBtn) downloadBtn.style.display = 'block';
                if(videoCard) videoCard.style.display = 'block';
                element.style.background = "var(--card-glass)";
                console.error(err);
            });
        }
    </script>
    <script>
function checkLoginStatus() {
    const isLoggedIn = localStorage.getItem('isLoggedIn');
    const userName = localStorage.getItem('userName');
    const authArea = document.getElementById('authArea');

    if (isLoggedIn === 'true' && userName && authArea) {
        let userBox = document.querySelector('.user-nav-box');
        if(!userBox){
            const div = document.createElement('div');
            div.className = 'user-nav-box';
            div.innerHTML = `
                <span class="user-name-txt">مرحباً، ${userName}</span>
                <button onclick="logoutNow()" class="logout-btn-nav">خروج</button>
            `;
            authArea.appendChild(div);
        }
    }
}

function logoutNow() {
    if (confirm("هل تريد تسجيل الخروج من منصة PROJEXA؟")) {
        localStorage.clear();
        window.location.href = "index.html";
    }
}
document.addEventListener('DOMContentLoaded', checkLoginStatus);
document.addEventListener('DOMContentLoaded', function() {
    checkLoginStatus();
    loadProjectDetails();
});

function loadProjectDetails() {
    // 1. جلب الـ slug من الرابط الفوقاني للمتصفح
    const urlParams = new URLSearchParams(window.location.search);
    const projectSlug = urlParams.get('id');

    if (!projectSlug) {
        alert("كود المشروع مفقود!");
        return;
    }

    // 2. طلب تفاصيل المشروع من الباك إند
    fetch(`api.php?action=get_project_details&slug=${projectSlug}`)
    .then(response => response.json())
    .then(project => {
        if(project.error) {
            document.body.innerHTML = `<h1 style="text-align:center; margin-top:100px; font-family:'Cairo';">${project.error}</h1>`;
            return;
        }

        // 3. ضخ البيانات الحية في عناصر الصفحة تلقائياً
        document.title = `${project.title} | PROJEXA`;
        document.getElementById('projectTitle').innerText = project.title;
        document.getElementById('projectDescription').innerText = project.description;
        document.getElementById('teamMembers').innerText = project.team_members;
        document.getElementById('gradYear').innerText = `دفعة ${project.graduation_year}`;
        
        // تعديل رابط الـ PDF ورابط الفيديو لو موجودين
        if(project.pdf_url) {
            document.getElementById('pdfDownloadBtn').href = project.pdf_url;
        }
        if(project.video_url) {
            // كود تشغيل الفيديو المطور الخاص بك يوضع هنا تلقائياً ليعمل مع السيرفر
            initVideoPlayer(project.video_url); 
        }
    })
    .catch(err => console.error("خطأ في تحميل تفاصيل المشروع:", err));
}
</script>
