<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حساب جديد | Projexa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Cairo', sans-serif; }
        .box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; text-align: center; width: 400px; color: white; }
        h2 { margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; text-align: center; }
        select option { background: #1e293b; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .footer-text { margin-top: 15px; font-size: 14px; color: #94a3b8; }
        .footer-text a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>إنشاء حساب طالب</h2>
        <form id="regForm">
            <input type="text" id="name" placeholder="الاسم الكامل" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <select id="faculty">
                <option value="engineering">كلية الهندسة</option>
                <option value="science">كلية العلوم</option>
                <option value="commerce">كلية التجارة</option>
                <option value="specific_edu">تربية نوعية</option>
            </select>
            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <button type="submit">تسجيل الحساب</button>
        </form>
        <div class="footer-text">لديك حساب بالفعل؟ <a href="login.html">دخول الإدارة</a> أو <a href="index.html">الرئيسية</a></div>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            localStorage.setItem('role', 'student');
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', document.getElementById('name').value);
            alert("تم التسجيل بنجاح!");
            window.location.href = "index.html";
        };
    </script>
      </script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    @media (max-width: 992px) {
        /* 1. ضبط شريط التنقل العلوي بالكامل (الـ Navbar) */
        .navbar, .admin-header, .header, nav, .user-nav-box {
            flex-direction: column !important;
            gap: 12px !important;
            text-align: center !important;
            padding: 15px !important;
            height: auto !important;
            width: 100% !important;
            display: flex !important;
        }
        
        .nav-brand, .logo-section {
            justify-content: center !important;
            margin-bottom: 5px !important;
            display: flex !important;
        }

        .user-info {
            flex-direction: column !important;
            gap: 10px !important;
            width: 100% !important;
            justify-content: center !important;
            display: flex !important;
        }

        /* 2. تحويل جميع الجريدات وشبكات الكروت لعمود واحد يفرش الشاشة */
        .grid-container, .projects-grid, .tech-grid, #projectsGrid, .stats-grid, .main-grid, .faculty-grid {
            grid-template-columns: 1fr !important;
            gap: 15px !important;
            padding: 10px !important;
            width: 100% !important;
            display: grid !important;
        }

        /* 3. إلغاء الهوامش الجانبية الثابتة لصفحة الأدمن والمحتوى */
        .sidebar {
            width: 100% !important;
            height: auto !important;
            position: relative !important;
            box-shadow: none !important;
            padding: 15px !important;
        }
        
        .main-content {
            margin-right: 0 !important;
            margin-left: 0 !important;
            padding: 15px !important;
            width: 100% !important;
        }

        /* 4. ضبط العناوين والواجهات الكبيرة للـ Hero Sections */
        .hero-section, .dept-header, .welcome-text {
            height: auto !important;
            min-height: 200px !important;
            padding: 30px 15px !important;
            text-align: center !important;
        }
        
        .hero-section h1, .dept-header h1, .welcome-text h1 {
            font-size: 22px !important;
            line-height: 1.4 !important;
        }

        /* 5. إجبار الكروت على الاحتواء الكامل داخل شاشة الفون */
        .project-card, .tech-card, .card, .stat-card {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 0 10px 0 !important;
            box-sizing: border-box !important;
        }

        /* 6. حل مشكلة الجداول والـ Charts وتفعيل السكرول الجانبي السحري للجدول */
        div:has(table), .table-container, .table-responsive, .data-table-container {
            width: 100% !important;
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch !important;
        }
        
        table {
            min-width: 550px !important;
        }
        
        canvas, .chart-container {
            width: 100% !important;
            height: auto !important;
        }

        /* 7. ضبط الأزرار لتكون عريضة وسهلة اللمس بالإصبع */
        .btn, .btn-explore, .btn-action-view, .logout-btn, .menu-items a, input, select, textarea {
            width: 100% !important;
            text-align: center !important;
            display: block !important;
            box-sizing: border-box !important;
        }
        
        .filter-tabs-container, .menu-items {
            display: flex !important;
            flex-wrap: wrap !important;
            justify-content: center !important;
            gap: 8px !important;
        }
    }
</style>
</body>
</html>
