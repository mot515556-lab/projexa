<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Projexa | الإحصائيات الذكية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // التحقق فوراً: إذا لم يكن المستخدم "أدمن" يتم تحويله لصفحة تسجيل الدخول
        if (localStorage.getItem('role') !== 'admin') {
            window.location.href = "login.html";
        }
    </script>

    <style>
        :root { --primary: #1e40af; --secondary: #0f172a; --accent: #38bdf8; --bg: #f1f5f9; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); }

        /* نيف بار الإدارة */
        .admin-header {
            background: var(--secondary);
            color: white;
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover { background: #dc2626; }

        .container { padding: 30px 8%; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        .stat-card h3 { font-size: 2rem; color: var(--secondary); }
        .stat-card p { color: #64748b; font-weight: 600; }

        /* جدول المشاريع */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            overflow-x: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: right; }
        th { background: #f8fafc; padding: 15px; color: #64748b; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }

        .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .pending { background: #fef3c7; color: #92400e; }
        
        .chart-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
            height: 400px;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <div style="font-size: 22px; font-weight: 900;">PRO<span style="color:var(--accent)">JEXA</span> Admin</div>
        <button onclick="logout()" class="logout-btn">تسجيل الخروج <i class="fas fa-sign-out-alt"></i></button>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>145</h3>
                <p>إجمالي المشاريع</p>
            </div>
            <div class="stat-card">
                <h3 style="color: #f59e0b;">12</h3>
                <p>بانتظار المراجعة</p>
            </div>
            <div class="stat-card">
                <h3>2,450</h3>
                <p>عدد المشاهدات</p>
            </div>
        </div>

        <div class="table-container">
            <h2>المشاريع الأخيرة</h2>
            <table>
                <thead>
                    <tr>
                        <th>اسم المشروع</th>
                        <th>الكلية</th>
                        <th>الحالة</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>تصميم منشآت ذكية</td>
                        <td>هندسة</td>
                        <td><span class="status pending">قيد المراجعة</span></td>
                        <td><button style="color: var(--primary); border:none; background:none; cursor:pointer;">معاينة</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="chart-section">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        // وظيفة تسجيل الخروج
        function logout() {
            localStorage.removeItem('role');
            window.location.href = "index.html";
        }

        // تشغيل الرسم البياني
        window.onload = function() {
            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['هندسة', 'تجارة', 'علوم', 'تربية'],
                    datasets: [{
                        label: 'عدد المشاريع لكل كلية',
                        data: [65, 40, 25, 55],
                        backgroundColor: '#1e40af',
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        // البحث في الجدول
document.getElementById('search').addEventListener('keyup', function() {
    let val = this.value.toLowerCase();
    let rows = document.querySelectorAll('#pTable tr');
    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
    });
});

// وظيفة قبول المشروع
function approve(btn) {
    if(confirm("هل أنت متأكد من قبول هذا المشروع؟")) {
        let row = btn.parentElement.parentElement;
        let statusBadge = row.querySelector('.status');
        statusBadge.innerText = "مقبول";
        statusBadge.style.background = "#dcfce7";
        statusBadge.style.color = "#166534";
        btn.innerHTML = '<i class="fas fa-check"></i> تم القبول';
        btn.style.background = "#94a3b8";
        btn.disabled = true;
        
        // تحديث الرقم في الإحصائيات (وهمي حالياً)
        let total = document.querySelector('.stat-card h3');
        total.innerText = parseInt(total.innerText) + 1;
    }
}
function loadProjects() {
    const table = document.getElementById("pTable");
    const projects = JSON.parse(localStorage.getItem('myProjects')) || [];
    
    table.innerHTML = ""; 

    if(projects.length === 0) {
        table.innerHTML = "<tr><td colspan='4' style='text-align:center;'>لا توجد مشاريع مرفوعة حالياً</td></tr>";
        return;
    }

    projects.forEach((p, index) => {
        table.innerHTML += `
            <tr>
                <td>${p.title}</td>
                <td>${p.faculty}</td>
                <td><span class="badge ${p.status === 'approved' ? 'approved' : 'pending'}" 
                    style="padding:5px; border-radius:5px; background:${p.status === 'approved' ? '#dcfce7' : '#fef3c7'}">
                    ${p.status === 'approved' ? 'مقبول' : 'انتظار'}</span></td>
                <td>
                    <button onclick="approveSim('${index}')" style="color:green; border:none; background:none; cursor:pointer;"><i class="fas fa-check"></i></button>
                    <button onclick="deleteSim('${index}')" style="color:red; border:none; background:none; cursor:pointer; margin-right:10px;"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `;
    });
}

document.addEventListener('DOMContentLoaded', function() {
    // كود الحماية الموحد بتاعك متثبت زي ما هو
    if (localStorage.getItem('role') !== 'admin') {
        window.location.href = "login.html";
        return;
    }
    
    // تشغيل الـ Charts بتاعتك (لو محتاجة أرقام حية هنغذيها من الداتا بيز)
    loadLiveStatsAndCharts();
    
    // جلب قائمة المشاريع الحية جوه الجدول
    loadAdminTableProjects();
});

// 1. دالة جلب المشاريع الحية وضخها في الجدول بتاعك
function loadAdminTableProjects() {
    fetch('api.php?action=get_projects')
    .then(response => response.json())
    .then(projects => {
        const tableBody = document.getElementById('projectTableBody') || document.querySelector('table tbody');
        if(!tableBody) return;
        
        tableBody.innerHTML = ''; // مسح العينات القديمة
        
        if(projects.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">لا توجد مشاريع مرفوعة حالياً في قاعدة البيانات.</td></tr>`;
            return;
        }

        projects.forEach((p, index) => {
            // حقن البيانات في نفس تصميم جدولك الفخم
            tableBody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td style="font-weight:600;">${p.title}</td>
                    <td>${p.faculty_name || 'عام / غير محدد'}</td>
                    <td>
                        <span class="badge approved" style="padding:5px 10px; border-radius:5px; background:#dcfce7; color:#16a34a; font-weight:bold; font-size:12px;">
                            <i class="fas fa-check-circle"></i> نشط حياً
                        </span>
                    </td>
                    <td>
                        <button onclick="deleteProjectFromDB('${p.id}')" style="color:#ef4444; border:none; background:none; cursor:pointer; margin-right:10px; font-size:16px;" title="حذف نهائي">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
    })
    .catch(err => console.error("خطأ في جلب بيانات الجدول لـ الأدمن:", err));
}

// 2. دالة الحذف الحقيقي من قاعدة البيانات عبر الـ API
function deleteProjectFromDB(projectId) {
    if(confirm("⚠️ تنبيه: هل أنت متأكد من حذف هذا المشروع نهائياً من قاعدة البيانات والمنصة؟")) {
        const formData = new FormData();
        formData.append('project_id', projectId);

        fetch('api.php?action=delete_project', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if(data.success) {
                alert("تم حذف المشروع بنجاح من السيرفر.");
                loadAdminTableProjects(); // إعادة تحميل الجدول فوراً بدون ريفريش
                loadLiveStatsAndCharts(); // إعادة تحديث الإحصائيات والـ Charts
            } else {
                alert("خطأ أثناء الحذف: " + data.error);
            }
        })
        .catch(err => console.error("خطأ في الاتصال بالـ API لحذف المشروع:", err));
    }
}

// 3. دالة ذكية لتغذية الـ Charts والعدادات الفوقانية بأرقام حقيقية من الداتا بيز
function loadLiveStatsAndCharts() {
    fetch('api.php?action=get_projects')
    .then(response => response.json())
    .then(projects => {
        // تحديث كروت الإحصائيات الفوقانية في لوحة تحكمك
        const totalCountEl = document.getElementById('totalProjects') || document.querySelector('.card:nth-child(1) h3');
        if(totalCountEl) totalCountEl.innerText = projects.length;

        const investCount = projects.filter(p => p.is_investment_ready == 1).length;
        const investCountEl = document.getElementById('investedProjects') || document.querySelector('.card:nth-child(2) h3');
        if(investCountEl) investCountEl.innerText = investCount;

        // تحديث الـ Chart.js بتاعك بالأرقام الحقيقية للكليات
        const compCount = projects.filter(p => p.faculty_name === 'كلية الحاسبات والمعلومات').length;
        const engCount = projects.filter(p => p.faculty_name === 'كلية الهندسة').length;
        const specCount = projects.filter(p => p.faculty_name === 'كلية التربية النوعية').length;
        const sciCount = projects.filter(p => p.faculty_name === 'كلية العلوم').length;

        // تحديث داتا الـ Chart الأصلي بتاعك (بافتراض اسم المتغير myChart أو تحديث الأرقام مباشرة)
        if(typeof myChart !== 'undefined' && myChart.data) {
            myChart.data.datasets[0].data = [compCount, engCount, specCount, sciCount];
            myChart.update();
        }
    });
}
    </script>
</body>
</html>
