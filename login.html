<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الإدارة | Projexa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --admin-color: #1e40af; --bg: #0f172a; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Cairo', sans-serif; }
        .box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        button { width: 100%; padding: 12px; background: var(--admin-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>دخول المسؤول</h2>
        <input type="text" id="user" placeholder="اسم المسؤول">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="adminLogin()">دخول</button>
    </div>
    <script>
        function adminLogin() {
            var u = document.getElementById('user').value;
            var p = document.getElementById('pass').value;
            if (u === "admin" && p === "123") {
                localStorage.setItem('role', 'admin'); // بنعرف المتصفح إنك أدمن
                window.location.href = "admin.html"; 
            } else {
                alert("بيانات الدخول غلط!");
            }
        }
    </script>
      </script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    @media (max-width: 992px) {
        /* 1. ضبط شريط التنقل العلوي بالكامل (الـ Navbar) */
        .navbar, .admin-header, .header, nav, .user-nav-box {
            flex-direction: column !important;
            gap: 12px !important;
            text-align: center !important;
            padding: 15px !important;
            height: auto !important;
            width: 100% !important;
            display: flex !important;
        }
        
        .nav-brand, .logo-section {
            justify-content: center !important;
            margin-bottom: 5px !important;
            display: flex !important;
        }

        .user-info {
            flex-direction: column !important;
            gap: 10px !important;
            width: 100% !important;
            justify-content: center !important;
            display: flex !important;
        }

        /* 2. تحويل جميع الجريدات وشبكات الكروت لعمود واحد يفرش الشاشة */
        .grid-container, .projects-grid, .tech-grid, #projectsGrid, .stats-grid, .main-grid, .faculty-grid {
            grid-template-columns: 1fr !important;
            gap: 15px !important;
            padding: 10px !important;
            width: 100% !important;
            display: grid !important;
        }

        /* 3. إلغاء الهوامش الجانبية الثابتة لصفحة الأدمن والمحتوى */
        .sidebar {
            width: 100% !important;
            height: auto !important;
            position: relative !important;
            box-shadow: none !important;
            padding: 15px !important;
        }
        
        .main-content {
            margin-right: 0 !important;
            margin-left: 0 !important;
            padding: 15px !important;
            width: 100% !important;
        }

        /* 4. ضبط العناوين والواجهات الكبيرة للـ Hero Sections */
        .hero-section, .dept-header, .welcome-text {
            height: auto !important;
            min-height: 200px !important;
            padding: 30px 15px !important;
            text-align: center !important;
        }
        
        .hero-section h1, .dept-header h1, .welcome-text h1 {
            font-size: 22px !important;
            line-height: 1.4 !important;
        }

        /* 5. إجبار الكروت على الاحتواء الكامل داخل شاشة الفون */
        .project-card, .tech-card, .card, .stat-card {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 0 10px 0 !important;
            box-sizing: border-box !important;
        }

        /* 6. حل مشكلة الجداول والـ Charts وتفعيل السكرول الجانبي السحري للجدول */
        div:has(table), .table-container, .table-responsive, .data-table-container {
            width: 100% !important;
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch !important;
        }
        
        table {
            min-width: 550px !important;
        }
        
        canvas, .chart-container {
            width: 100% !important;
            height: auto !important;
        }

        /* 7. ضبط الأزرار لتكون عريضة وسهلة اللمس بالإصبع */
        .btn, .btn-explore, .btn-action-view, .logout-btn, .menu-items a, input, select, textarea {
            width: 100% !important;
            text-align: center !important;
            display: block !important;
            box-sizing: border-box !important;
        }
        
        .filter-tabs-container, .menu-items {
            display: flex !important;
            flex-wrap: wrap !important;
            justify-content: center !important;
            gap: 8px !important;
        }
    }
</style>
</body>
</html>
